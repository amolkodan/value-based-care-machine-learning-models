database_url: ${DATABASE_URL}
contract_id: DEMO
feature_window_months: 6
label_horizon_months: 3
random_seed: 7
model_families:
  - risk_high_cost
  - cost_forecast
  - risk_advanced
  - risk_temporal
  - cost_interval
  - uplift_proxy
  - anomaly_cost_spike
  - risk_trajectory_segment
  - uplift_stronger
  - contract_sensitive_ranker
  - vbc_cost_optimizer
  - outcome_improvement_optimizer
  - claims_behavior_predictor
  - provider_advisory_ranker
model_params:
  contract_sensitive_ranker:
    contract_weight: 1.2
  anomaly_cost_spike:
    contamination: 0.1
  vbc_cost_optimizer:
    objective_weight: 1.0
  outcome_improvement_optimizer:
    objective_weight: 1.0
