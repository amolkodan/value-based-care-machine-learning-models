name: ci
on:
  push:
  pull_request:

jobs:
  quick-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Tests (quick)
        run: pytest -q

      - name: Build package (sdist + wheel)
        run: |
          python -m pip install -U build twine
          python -m build
          twine check dist/*

  extended-tests:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Tests (extended profile)
        run: pytest -q
